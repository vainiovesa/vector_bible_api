services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vector_bible_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
      POSTGRES_DB: ${POSTGRES_DB:-vector_bible}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
